name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Secret scanning ─────────────────────────────────────────────────────────
  # Run TruffleHog before any other job to catch accidentally committed secrets
  # before they reach main. Fails the build immediately on any detected pattern.
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history needed for diff-mode scanning across commits
          fetch-depth: 0

      - name: Run TruffleHog (diff scan)
        uses: trufflesecurity/trufflehog@main
        with:
          # For PRs: scan only changed commits; for pushes to main: scan HEAD
          extra_args: --only-verified

  lint-and-typecheck:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm exec eslint app/ lib/ hooks/ components/ types/

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      # Use GitHub Secrets for test keys — even non-production keys should not
      # be hardcoded in CI config. Set these in: Settings → Secrets → Actions.
      GEMINI_API_KEY: ${{ secrets.CI_GEMINI_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.CI_ELEVENLABS_API_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CI_CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CI_CLERK_PUBLISHABLE_KEY }}
      DODO_PAYMENTS_API_KEY: ${{ secrets.CI_DODO_PAYMENTS_API_KEY }}
      DODO_WEBHOOK_SECRET: ${{ secrets.CI_DODO_WEBHOOK_SECRET }}
      DODO_PRO_PRODUCT_ID: ${{ secrets.CI_DODO_PRO_PRODUCT_ID }}
      DODO_BUSINESS_PRODUCT_ID: ${{ secrets.CI_DODO_BUSINESS_PRODUCT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm exec vitest run --reporter=verbose

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare Pages
        run: pnpm run build:cf
