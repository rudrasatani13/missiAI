name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Secret scanning ─────────────────────────────────────────────────────────
  # Run TruffleHog before any other job to catch accidentally committed secrets
  # before they reach main. Fails the build immediately on any detected pattern.
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history needed for diff-mode scanning across commits
          fetch-depth: 0

      - name: Run TruffleHog (diff scan)
        uses: trufflesecurity/trufflehog@main
        with:
          # For PRs: scan only changed commits; for pushes to main: scan HEAD
          extra_args: --only-verified

  lint-and-typecheck:
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm exec eslint app/ lib/ hooks/ components/ types/

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      # Dummy values for test environment — tests mock all external services.
      # No real keys needed; these just satisfy env validation at import time.
      AI_BACKEND: vertex
      ELEVENLABS_API_KEY: test-dummy-key
      CLERK_SECRET_KEY: sk_test_dummy
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummy
      DODO_PAYMENTS_API_KEY: test-dummy-key
      DODO_WEBHOOK_SECRET: whsec_test_dummy
      DODO_PRO_PRODUCT_ID: pdt_test_dummy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm exec vitest run --reporter=verbose

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_APP_URL: "https://missi.space"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare Workers
        run: pnpm run build:cf

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Only deploy on pushes to main — not on pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: "667d6e5f7f5a8ecbd83cd85bdacd3ecc"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare Workers
        run: pnpm run build:cf

      - name: Deploy to Cloudflare Workers
        run: pnpm dlx wrangler deploy
