name = "missiai"
# Custom entry wraps the OpenNext worker so we can handle /api/v1/voice-relay
# on the raw Cloudflare runtime. OpenNext 1.x strips Response.webSocket,
# which prevents native WebSocket upgrades from Next.js API routes. See
# workers/entry.ts and workers/live/handler.ts for details.
main = "workers/entry.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Required secrets/config — set via `wrangler secret put <NAME>` or the
# Cloudflare dashboard environment settings. NEVER put real values in this
# file or any .env.*.local file that could be committed.
#
# AI / Vertex
# - GOOGLE_SERVICE_ACCOUNT_JSON
# - VERTEX_AI_PROJECT_ID
# - VERTEX_AI_LOCATION      # Optional; defaults to us-central1
# - AI_BACKEND              # Optional; currently must remain "vertex"
# - OPENAI_API_KEY          # Optional fallback
# - ENABLE_OPENAI_FALLBACK  # Optional fallback toggle
# - ANTHROPIC_API_KEY       # Optional fallback
#
# Auth
# - CLERK_SECRET_KEY
# - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
#
# KV encryption / live relay tickets
# - MISSI_KV_ENCRYPTION_SECRET
#
# Guest session signing
# - GUEST_SESSION_SECRET

[vars]
NEXT_PUBLIC_APP_URL = "https://missi.space"

[[kv_namespaces]]
binding = "MISSI_MEMORY"
id = "ddf2e5eb21484fd1a9aecd8e4eaada74"
preview_id = "ed3c69b0ac8749e4ba80d58d262fd97f"

[[durable_objects.bindings]]
name = "ATOMIC_COUNTER"
class_name = "AtomicCounterDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AtomicCounterDO"]