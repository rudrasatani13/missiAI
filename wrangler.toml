name = "missiai"
pages_build_output_dir = ".vercel/output/static"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Required secrets — set via `wrangler secret put <NAME>` or Cloudflare Pages
# dashboard (Settings → Environment variables → Encrypted). NEVER put real
# values in this file or any .env.*.local file that could be committed.
#
# AI providers
# - GEMINI_API_KEY
# - ELEVENLABS_API_KEY
# - ELEVENLABS_VOICE_ID
#
# Auth
# - CLERK_SECRET_KEY
# - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
# - ADMIN_USER_ID
#
# Payments (Dodo)
# - DODO_PAYMENTS_API_KEY
# - DODO_WEBHOOK_SECRET
# - DODO_PRO_PRODUCT_ID
# - DODO_BUSINESS_PRODUCT_ID
#
# Web Push (VAPID)
# - VAPID_PRIVATE_KEY

[vars]
DAILY_BUDGET_USD = "5.0"
NEXT_PUBLIC_APP_URL = "https://missi.space"

[[kv_namespaces]]
binding = "MISSI_MEMORY"
id = "ddf2e5eb21484fd1a9aecd8e4eaada74"
preview_id = "ed3c69b0ac8749e4ba80d58d262fd97f"

[[vectorize]]
binding = "LIFE_GRAPH"
index_name = "missiai-life-graph"