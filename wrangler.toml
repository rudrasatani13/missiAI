name = "missiai"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Required secrets — set via `wrangler secret put <NAME>` or Cloudflare Pages
# dashboard (Settings → Environment variables → Encrypted). NEVER put real
# values in this file or any .env.*.local file that could be committed.
#
# AI providers
# - ELEVENLABS_API_KEY
# - ELEVENLABS_VOICE_ID
#
# Voice Persona IDs (optional — feature degrades gracefully if not set)
# - ELEVENLABS_VOICE_CALM       # Calm Therapist persona
# - ELEVENLABS_VOICE_COACH      # Energetic Coach persona
# - ELEVENLABS_VOICE_FRIEND     # Sassy Friend persona
# - ELEVENLABS_VOICE_BOLLYWOOD  # Bollywood Narrator persona
# - ELEVENLABS_VOICE_DESI_MOM   # Desi Mom persona
#
# Auth
# - CLERK_SECRET_KEY
# - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
# - ADMIN_USER_ID
#
# Payments (Dodo)
# - DODO_PAYMENTS_API_KEY
# - DODO_WEBHOOK_SECRET
# - DODO_PRO_PRODUCT_ID
# - DODO_BUSINESS_PRODUCT_ID
#
# Web Push (VAPID)
# - VAPID_PRIVATE_KEY


[vars]
DAILY_BUDGET_USD = "5.0"
NEXT_PUBLIC_APP_URL = "https://missi.space"

[[kv_namespaces]]
binding = "MISSI_MEMORY"
id = "ddf2e5eb21484fd1a9aecd8e4eaada74"
preview_id = "ed3c69b0ac8749e4ba80d58d262fd97f"

[[vectorize]]
binding = "LIFE_GRAPH"
index_name = "missiai-life-graph"